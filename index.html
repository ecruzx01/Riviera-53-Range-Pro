<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Maximizer</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg-overlay: rgba(15, 23, 42, 0.85);
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-light: #64748b;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
      background-size: cover;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .app-container {
      background: var(--card-bg);
      width: 100%;
      max-width: 500px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      padding: 30px;
      box-sizing: border-box;
      margin: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header img {
      width: 64px;
      height: 64px;
      margin-bottom: 10px;
    }
    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      color: #0f172a;
    }
    select {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      background-color: #f8fafc;
      margin-bottom: 20px;
      cursor: pointer;
    }
    select:focus {
      border-color: #3b82f6;
    }
    #sub-question {
      display: none;
      background: #eff6ff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #3b82f6;
    }
    #sub-question p {
      margin: 0 0 10px 0;
      font-weight: 600;
    }
    .sub-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    .sub-btn:hover {
      background: #dbeafe;
    }
    .recommendation-area {
      display: none;
      margin-top: 20px;
    }
    .note {
      font-size: 0.85rem;
      color: #b45309;
      background: #fef3c7;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      display: none;
    }
    .cc-card {
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      color: white;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .cc-card span {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-top: 4px;
    }
    
    /* Card Colors */
    .bg-costco { background: linear-gradient(135deg, #005f83, #0082b3); }
    .bg-amazon { background: linear-gradient(135deg, #1c2938, #37475a); }
    .bg-schwab { background: linear-gradient(135deg, #a6a8ab, #c0c2c4); color: #1e293b; }
    .bg-bppr { background: linear-gradient(135deg, #e3000f, #ff3333); }
    .bg-aa { background: linear-gradient(135deg, #2b2b2b, #4b4b4b); }
    .bg-onepay { background: linear-gradient(135deg, #6366f1, #3b82f6); }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <img src="https://cdn-icons-png.flaticon.com/512/438/438526.png" alt="App Icon">
    <h1>Card Maximizer</h1>
  </div>

  <select id="category-select">
    <option value="" disabled selected>Select a spending category...</option>
    </select>

  <div id="sub-question">
    <p>What is your top priority for this rental?</p>
    <button class="sub-btn" onclick="resolveSub('insurance')">Coverage (Primary Insurance)</button>
    <button class="sub-btn" onclick="resolveSub('discount')">Discounts & Perks</button>
    <button class="sub-btn" onclick="resolveSub('cashback')">Maximize Cash Back</button>
  </div>

  <div id="note-area" class="note"></div>

  <div class="recommendation-area" id="recommendation-area">
    <h3 style="margin-top:0; font-size: 1.1rem;">Top 2 Recommended Cards:</h3>
    <div id="cards-container"></div>
  </div>
</div>

<script>
  // Spending Categories & Logic
  const categories = {
    "Auto & Transport: Gas & Fuel": { emoji: "⛽", cards: [ { name: "Citi Costco Anywhere Visa", perk: "4% cash back (up to $7k/yr)", color: "bg-costco" }, { name: "Amazon Prime Visa", perk: "2% cash back", color: "bg-amazon" } ] },
    "Dining & Drinks: Restaurants": { emoji: "🍽️", cards: [ { name: "Citi Costco Anywhere Visa", perk: "3% cash back", color: "bg-costco" }, { name: "Amazon Prime Visa", perk: "2% cash back", color: "bg-amazon" } ] },
    "Groceries (General)": { emoji: "🛒", cards: [ { name: "OnePay", perk: "1.5% flat cash back", color: "bg-onepay" }, { name: "Amazon Prime Visa", perk: "1% cash back", color: "bg-amazon" } ] },
    "Groceries (Walmart)": { emoji: "🏪", cards: [ { name: "OnePay", perk: "3% to 5% cash back (with Walmart+)", color: "bg-onepay" }, { name: "Citi Costco Anywhere Visa", perk: "1% cash back", color: "bg-costco" } ] },
    "Travel: Airfare": { emoji: "✈️", cards: [ { name: "AMEX Schwab Platinum", perk: "5x points on flights", color: "bg-schwab" }, { name: "Citi AAdvantage Executive", perk: "4x AA miles & Lounge Access", color: "bg-aa" } ] },
    "Travel: Hotels & Lodging": { emoji: "🏨", cards: [ { name: "AMEX Schwab Platinum", perk: "5x points on prepaid hotels", color: "bg-schwab" }, { name: "Citi AAdvantage Executive", perk: "10x AA miles on AA hotels", color: "bg-aa" } ] },
    "Travel: Car Rental": { emoji: "🚗", requiresSubChoice: true },
    "Yachting: Diesel & Gasoline": { 
      emoji: "🛥️", 
      note: "Important: Marina fuel frequently codes under MCC 5932 (Marinas), which does NOT trigger standard gas station multipliers. A strong flat-rate card is highly recommended here.",
      cards: [ { name: "OnePay", perk: "1.5% flat cash back on all transactions", color: "bg-onepay" }, { name: "Citi AAdvantage Executive", perk: "1x AA mile (Builds loyalty status)", color: "bg-aa" } ] 
    },
    "Yachting: Port Entry & Customs Fees": { emoji: "🛂", cards: [ { name: "Citi AAdvantage Executive", perk: "Global Entry Credit available", color: "bg-aa" }, { name: "AMEX Schwab Platinum", perk: "No Foreign Transaction Fees", color: "bg-schwab" } ] },
    "Yachting: Marina Slip & Mooring Fees": { emoji: "⚓", cards: [ { name: "OnePay", perk: "1.5% flat cash back", color: "bg-onepay" }, { name: "AMEX Schwab Platinum", perk: "1x points (No FTF if international)", color: "bg-schwab" } ] },
    "Shopping: Electronics": { emoji: "💻", cards: [ { name: "Amazon Prime Visa", perk: "5% back (if buying on Amazon)", color: "bg-amazon" }, { name: "OnePay", perk: "1.5% flat cash back", color: "bg-onepay" } ] }
  };

  const carRentalSubChoices = {
    "insurance": [ { name: "BPPR Visa Infinite", perk: "Primary Coverage up to 31 days ($75k limit)", color: "bg-bppr" }, { name: "BPPR AAdvantage MC Black", perk: "MasterRental Primary Coverage", color: "bg-bppr" } ],
    "discount": [ { name: "Citi AAdvantage Executive", perk: "Avis/Budget discounts & $120 credit", color: "bg-aa" }, { name: "AMEX Schwab Platinum", perk: "Hertz/Avis/National Elite Status", color: "bg-schwab" } ],
    "cashback": [ { name: "Citi Costco Anywhere Visa", perk: "3% cash back on travel", color: "bg-costco" }, { name: "OnePay", perk: "1.5% flat cash back", color: "bg-onepay" } ]
  };

  // Populate Dropdown
  const select = document.getElementById('category-select');
  Object.keys(categories).forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = `${categories[cat].emoji} ${cat}`;
    select.appendChild(opt);
  });

  // Handle Selection
  select.addEventListener('change', (e) => {
    const val = e.target.value;
    const data = categories[val];
    
    document.getElementById('note-area').style.display = 'none';
    document.getElementById('recommendation-area').style.display = 'none';
    
    if (data.requiresSubChoice) {
      document.getElementById('sub-question').style.display = 'block';
    } else {
      document.getElementById('sub-question').style.display = 'none';
      if (data.note) {
        document.getElementById('note-area').textContent = data.note;
        document.getElementById('note-area').style.display = 'block';
      }
      renderCards(data.cards);
    }
  });

  function resolveSub(choice) {
    document.getElementById('sub-question').style.display = 'none';
    renderCards(carRentalSubChoices[choice]);
  }

  function renderCards(cards) {
    const container = document.getElementById('cards-container');
    container.innerHTML = '';
    cards.forEach(c => {
      const div = document.createElement('div');
      div.className = `cc-card ${c.color}`;
      div.innerHTML = `${c.name} <span>${c.perk}</span>`;
      container.appendChild(div);
    });
    document.getElementById('recommendation-area').style.display = 'block';
  }

  // Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('Service Worker Registered'))
      .catch(err => console.error('Service Worker Registration Failed:', err));
  }
</script>

</body>
</html>
