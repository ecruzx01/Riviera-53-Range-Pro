<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c.Reward Maximizer</title>
    <style>
        :root { --primary: #0046be; --secondary: #e51937; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .app-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        select { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #cbd5e0; font-size: 16px; margin-bottom: 25px; cursor: pointer; background: #fff; }
        .result { padding: 20px; border-radius: 12px; margin-bottom: 15px; display: none; border: 1px solid #ddd; }
        .winner { background: #e7f3ff; border-left: 8px solid var(--primary); }
        .runner { background: #fff5f5; border-left: 8px solid var(--secondary); }
        .tag { font-size: 10px; font-weight: bold; padding: 3px 10px; border-radius: 20px; color: white; margin-bottom: 8px; display: inline-block; text-transform: uppercase; }
        .tag-cash { background: #2f855a; }
        .tag-ins { background: #c05621; }
        .card-name { font-size: 18px; font-weight: bold; color: #2d3748; }
        .reward { font-size: 16px; font-weight: bold; color: var(--primary); margin: 5px 0; }
        .desc { font-size: 13px; color: #4a5568; line-height: 1.4; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>c.Reward Maximizer</h1>
    <label style="font-weight:bold; display:block; margin-bottom:10px;">Select Spending Category:</label>
    <select id="cardSelector" onchange="runLogic()">
        <option value="">-- Search Category --</option>
        
        <optgroup label="Yachting (BVI/USVI Trip)">
            <option value="y_customs">Customs & Immigration Fees</option>
            <option value="y_marina">Marina & Mooring Fees</option>
            <option value="y_fuel">Diesel & Gasoline (Riviera/Tender)</option>
            <option value="y_provisions">Provisions & Groceries</option>
            <option value="y_dining">Dining & Yacht Clubs</option>
            <option value="y_gear">Clothing & Water Sports Gear</option>
            <option value="y_transport">Taxis, Ferries & Car Rental</option>
            <option value="y_air">Airline (American) & Rideshare</option>
            <option value="y_tours">Tours & Photo Expeditions</option>
            <option value="y_medical">Emergency Medical (Island Travel)</option>
            <option value="y_lodging">Lodging (Hotels/Resorts)</option>
        </optgroup>

        <optgroup label="Standard Categories">
            <option value="gas">Standard Gas & Fuel</option>
            <option value="dining">Standard Restaurants</option>
            <option value="util">Utilities & Fees</option>
        </optgroup>
    </select>

    <div id="wBox" class="result winner"></div>
    <div id="rBox" class="result runner"></div>
</div>

<script>
const db = {
    // YACHTING CATEGORIES
    "y_customs": { w: ["OnePay Mastercard", "1.5% Cash Back", "Best for government fees & permits.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },
    "y_marina": { w: ["Costco Anywhere Visa", "3% Cash Back", "Classified under 'Travel' (Lodging/Cruise).", "cash"], r: ["OnePay Mastercard", "1.5% Cash Back", "Base rewards.", "cash"] },
    "y_fuel": { w: ["Costco Anywhere Visa", "4% Cash Back", "First $7k/yr for marine/auto fuel.", "cash"], r: ["OnePay Cash", "3% Cash Back", "If Gas category selected.", "cash"] },
    "y_provisions": { w: ["Costco Anywhere Visa", "2% Cash Back", "Use for Costco hauls before departure.", "cash"], r: ["OnePay Mastercard", "1.5% Cash Back", "Best for local island shops/Lavazza.", "cash"] },
    "y_dining": { w: ["Costco Anywhere Visa", "3% Cash Back", "Restaurants, bars, and yacht clubs.", "cash"], r: ["OnePay Cash", "3% Cash Back", "If Dining selected.", "cash"] },
    "y_gear": { w: ["Chase Visa Signature", "Purchase Protection", "Damage/Theft protection for new gear.", "ins"], r: ["Popular AAdvantage Black", "Warranty Extension", "Ideal for expensive dive tech.", "ins"] },
    "y_transport": { w: ["Costco Anywhere Visa", "3% Cash Back", "Covers taxis, ferries, and car rentals.", "cash"], r: ["OnePay Mastercard", "1.5% Cash Back", "Base rewards.", "cash"] },
    "y_air": { w: ["Popular AAdvantage Black", "AA Status Benefits", "Earn miles & loyalty points on AA.", "cash"], r: ["AMEX Schwab Platinum", "$200 Uber Cash", "For airport rideshares.", "ins"] },
    "y_tours": { w: ["Costco Anywhere Visa", "3% Cash Back", "Eligible under Travel Agencies/Tours.", "cash"], r: ["OnePay Mastercard", "1.5% Cash Back", "Base rewards.", "cash"] },
    "y_medical": { w: ["Popular AAdvantage Black", "$150,000 Medical", "Crucial for BVI/Island emergencies.", "ins"], r: ["Popular AAdvantage Black", "$100/Tooth Dental", "Coverage for travel injuries.", "ins"] },
    "y_lodging": { w: ["Costco Anywhere Visa", "3% Cash Back", "Hotels and resorts worldwide.", "cash"], r: ["OnePay Mastercard", "1.5% Cash Back", "Standard base rate.", "cash"] },

    // STANDARD
    "gas": { w: ["Costco Anywhere Visa", "4% Cash Back", "Up to $7k/yr.", "cash"], r: ["OnePay Cash", "3% Cash Back", "With Cash+ status.", "cash"] },
    "dining": { w: ["Costco Anywhere Visa", "3% Cash Back", "Worldwide restaurants.", "cash"], r: ["OnePay Cash", "3% Cash Back", "With Cash+ status.", "cash"] },
    "util": { w: ["OnePay Mastercard", "1.5% Cash Back", "Best for utilities/fees.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] }
};

function runLogic() {
    const key = document.getElementById('cardSelector').value;
    const w = document.getElementById('wBox');
    const r = document.getElementById('rBox');

    if (!key || !db[key]) {
        w.style.display = 'none'; r.style.display = 'none';
        return;
    }

    const data = db[key];
    w.style.display = 'block'; r.style.display = 'block';

    w.innerHTML = `<span class="tag ${data.w[3]==='cash'?'tag-cash':'tag-ins'}">${data.w[3]==='cash'?'Cash Max':'Protection'}</span><div class="card-name">${data.w[0]}</div><div class="reward">${data.w[1]}</div><div class="desc">${data.w[2]}</div>`;
    r.innerHTML = `<span class="tag ${data.r[3]==='cash'?'tag-cash':'tag-ins'}">${data.r[3]==='cash'?'Cash Max':'Protection'}</span><div class="card-name">${data.r[0]}</div><div class="reward">${data.r[1]}</div><div class="desc">${data.r[2]}</div>`;
}
</script>

</body>
</html>
