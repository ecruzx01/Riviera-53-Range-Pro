<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c.Reward Maximizer</title>
    <style>
        :root { --primary: #0046be; --secondary: #e51937; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .app-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        h2 { font-size: 16px; color: #555; margin-bottom: 10px; }
        select { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #cbd5e0; font-size: 16px; margin-bottom: 25px; cursor: pointer; background: #fff; }
        .result { padding: 20px; border-radius: 12px; margin-bottom: 15px; display: none; border: 1px solid #ddd; }
        .winner { background: #e7f3ff; border-left: 8px solid var(--primary); }
        .runner { background: #fff5f5; border-left: 8px solid var(--secondary); }
        .tag { font-size: 10px; font-weight: bold; padding: 3px 10px; border-radius: 20px; color: white; margin-bottom: 8px; display: inline-block; text-transform: uppercase; }
        .tag-cash { background: #2f855a; }
        .tag-ins { background: #c05621; }
        .card-name { font-size: 18px; font-weight: bold; color: #2d3748; }
        .reward { font-size: 16px; font-weight: bold; color: var(--primary); margin: 5px 0; }
        .desc { font-size: 13px; color: #4a5568; line-height: 1.4; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>c.Reward Maximizer</h1>

    <h2>General Categories</h2>
    <select id="genSelector" onchange="runLogic('genSelector')">
        <option value="">-- Select General Category --</option>
        <optgroup label="Auto & Transport">
            <option value="car_ins">Car Insurance</option>
            <option value="gas">Gas & Fuel</option>
            <option value="parking">Parking / Tolls</option>
            <option value="reg">Registration</option>
            <option value="rideshare">Rideshare</option>
            <option value="parts">Service & Parts</option>
        </optgroup>
        <optgroup label="Dining & Drinks">
            <option value="dining">Restaurants / Bars / Fast Food</option>
            <option value="coffee">Coffee Shops</option>
            <option value="delivery">Food Delivery</option>
        </optgroup>
        <optgroup label="Home">
            <option value="home_imp">Home Improvement / Repairs</option>
            <option value="home_ins">Home Insurance</option>
            <option value="furnishings">Furnishings</option>
        </optgroup>
        <optgroup label="Shopping & Kids">
            <option value="groceries">Groceries (Walmart/Costco)</option>
            <option value="kids">Allowance / Kids Health</option>
        </optgroup>
    </select>

    <h2>Yachting (Virgin Islands)</h2>
    <select id="yachtSelector" onchange="runLogic('yachtSelector')">
        <option value="">-- Select Yachting Category --</option>
        <option value="customs">Customs & Immigration Fees (BVI/USVI)</option>
        <option value="decal">Customs User Fee Decal (CBP)</option>
        <option value="slip">Marina Slip Fees (Tortola/St. Thomas)</option>
        <option value="mooring">Mooring Ball Fees (St. John/BVI)</option>
        <option value="boat_fuel">Diesel & Gasoline (Riviera 53)</option>
        <option value="yacht_pro">Provisions & Groceries (Lavazza/Pets)</option>
        <option value="yacht_dine">Dining & Entertainment (Yacht Clubs)</option>
        <option value="yacht_gear">Scuba & Water Sports Equipment</option>
        <option value="yacht_trans">Island Transportation (Ferry/Taxi)</option>
        <option value="yacht_med">Emergency Medical (Island Travel)</option>
        <option value="yacht_lodging">Lodging (Hotels/Resorts)</option>
    </select>

    <div id="wBox" class="result winner"></div>
    <div id="rBox" class="result runner"></div>
</div>

<script>
const db = {
    // GENERAL MAPPING
    "car_ins": { w: ["Popular AAdvantage Black", "PRIMARY PROTECTION", "$75k Collision/Theft. Decline agency CDW.", "ins"], r: ["Chase Visa", "Secondary Protection", "$60k coverage.", "ins"] },
    "gas": { w: ["Costco Anywhere Visa", "4% Cash Back", "Up to $7k/yr, then 1%.", "cash"], r: ["OnePay Cash", "3% Cash Back", "If Gas category selected.", "cash"] },
    "parking": { w: ["Costco Anywhere Visa", "3% Cash Back", "Eligible travel category.", "cash"], r: ["OnePay Mastercard", "1.5% Cash Back", "Base rate.", "cash"] },
    "dining": { w: ["Costco Anywhere Visa", "3% Cash Back", "Restaurants, bars, fast food.", "cash"], r: ["OnePay Cash", "3% Cash Back", "If Dining selected.", "cash"] },
    "groceries": { w: ["OnePay Mastercard", "5% Cash Back", "At Walmart (w/ Walmart+).", "cash"], r: ["Costco Anywhere Visa", "2% Cash Back", "At Costco Warehouse.", "cash"] },
    
    // YACHTING MAPPING
    "customs": { w: ["OnePay Mastercard", "1.5% Cash Back", "Best for official BVI/USVI government fees.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard base rate.", "cash"] },
    "decal": { w: ["OnePay Mastercard", "1.5% Cash Back", "Max base rate for CBP decal purchase.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard base rate.", "cash"] },
    "slip": { w: ["Costco Anywhere Visa", "3% Cash Back", "Coded as Travel/Lodging for marinas.", "cash"], r: ["OnePay Mastercard", "1.5% Cash Back", "Base rewards rate.", "cash"] },
    "mooring": { w: ["Costco Anywhere Visa", "3% Cash Back", "Eligible under the Travel category.", "cash"], r: ["OnePay Mastercard", "1.5% Cash Back", "Standard base rewards.", "cash"] },
    "boat_fuel": { w: ["OnePay Mastercard", "1.5% Cash Back", "Marinas (MCC 4468) often exclude the 4% Costco gas bonus.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Base rate if Marina isn't coded as Gas.", "cash"] },
    "yacht_pro": { w: ["OnePay Mastercard", "1.5% Cash Back", "Best for specialty groceries and local produce.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard base rate.", "cash"] },
    "yacht_dine": { w: ["Costco Anywhere Visa", "3% Cash Back", "Includes Yacht Clubs and resort dining.", "cash"], r: ["OnePay Cash", "3% Cash Back", "If Dining category selected.", "cash"] },
    "yacht_gear": { w: ["Chase Visa", "Purchase Protection", "Damage/Theft protection for gear for 120 days.", "ins"], r: ["OnePay Mastercard", "1.5% Cash Back", "Best for recurring tank refills.", "cash"] },
    "yacht_trans": { w: ["Costco Anywhere Visa", "3% Cash Back", "Ferries, taxis, and car rentals.", "cash"], r: ["OnePay Mastercard", "1.5% Cash Back", "Base rewards rate.", "cash"] },
    "yacht_med": { w: ["Popular AAdvantage Black", "$150,000 Medical", "Emergency medical expenses while in Virgin Islands.", "ins"], r: ["Popular AAdvantage Black", "$100,000 Evacuation", "Medical repatriation to PR/US.", "ins"] },
    "yacht_lodging": { w: ["Costco Anywhere Visa", "3% Cash Back", "Hotels and resorts worldwide.", "cash"], r: ["OnePay Mastercard", "1.5% Cash Back", "Standard base rate.", "cash"] }
};

function runLogic(selectorId) {
    const key = document.getElementById(selectorId).value;
    const w = document.getElementById('wBox');
    const r = document.getElementById('rBox');
    
    // Clear the other selector when one is used
    if (selectorId === 'genSelector') document.getElementById('yachtSelector').value = "";
    else document.getElementById('genSelector').value = "";

    if (!key || !db[key]) {
        w.style.display = 'none'; r.style.display = 'none';
        return;
    }

    const data = db[key];
    w.style.display = 'block'; r.style.display = 'block';

    w.innerHTML = `<span class="tag ${data.w[3]==='cash'?'tag-cash':'tag-ins'}">${data.w[3]==='cash'?'Cash Max':'Protection'}</span><div class="card-name">${data.w[0]}</div><div class="reward">${data.w[1]}</div><div class="desc">${data.w[2]}</div>`;
    r.innerHTML = `<span class="tag ${data.r[3]==='cash'?'tag-cash':'tag-ins'}">${data.r[3]==='cash'?'Cash Max':'Protection'}</span><div class="card-name">${data.r[0]}</div><div class="reward">${data.r[1]}</div><div class="desc">${data.r[2]}</div>`;
}
</script>

</body>
</html>
