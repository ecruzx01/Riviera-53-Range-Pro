<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c.Reward Maximizer</title>
    <style>
        :root { --primary: #0046be; --secondary: #e51937; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .app-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        select { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #cbd5e0; font-size: 16px; margin-bottom: 25px; cursor: pointer; background: #fff; }
        .result { padding: 20px; border-radius: 12px; margin-bottom: 15px; display: none; border: 1px solid #ddd; }
        .winner { background: #e7f3ff; border-left: 8px solid var(--primary); }
        .runner { background: #fff5f5; border-left: 8px solid var(--secondary); }
        .tag { font-size: 10px; font-weight: bold; padding: 3px 10px; border-radius: 20px; color: white; margin-bottom: 8px; display: inline-block; text-transform: uppercase; }
        .tag-cash { background: #2f855a; }
        .tag-ins { background: #c05621; }
        .card-name { font-size: 18px; font-weight: bold; color: #2d3748; }
        .reward { font-size: 16px; font-weight: bold; color: var(--primary); margin: 5px 0; }
        .desc { font-size: 13px; color: #4a5568; line-height: 1.4; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>c.Reward Maximizer</h1>
    <label style="font-weight:bold; display:block; margin-bottom:10px;">Select Spending Category:</label>
    <select id="cardSelector" onchange="runLogic()">
        <option value="">-- Search Category --</option>
        
        <optgroup label="Auto & Transport">
            <option value="car_ins">Car Insurance</option>
            <option value="gas">Gas & Fuel</option>
            <option value="parking">Parking / Tolls</option>
            <option value="reg">Registration</option>
            <option value="rideshare">Rideshare</option>
            <option value="parts">Service & Parts</option>
        </optgroup>

        <optgroup label="Dining & Drinks">
            <option value="dining">Restaurants / Bars / Fast Food</option>
            <option value="coffee">Coffee Shops</option>
            <option value="delivery">Food Delivery</option>
        </optgroup>

        <optgroup label="Health">
            <option value="med">Dentist / Doctor / Lab</option>
            <option value="eyecare">Eyecare</option>
            <option value="pharmacy">Pharmacy / Vitamins</option>
            <option value="health_ins">Health Insurance</option>
        </optgroup>

        <optgroup label="Home">
            <option value="home_imp">Home Improvement / Repairs</option>
            <option value="home_ins">Home Insurance</option>
            <option value="furnishings">Furnishings</option>
            <option value="landscape">Landscape / Mortgage</option>
        </optgroup>

        <optgroup label="Travel & International">
            <option value="travel_air">Airfare / Hotels</option>
            <option value="travel_spec">Travel Gifts/Groceries/Pharmacy</option>
            <option value="travel_car">Car Rental (Intl)</option>
        </optgroup>

        <optgroup label="Office & Personal">
            <option value="office">Generator / Software / Programs</option>
            <option value="care">Hair / Spa / Personal Care</option>
            <option value="pets">Pet Food / Veterinary</option>
        </optgroup>

        <optgroup label="Shopping & Kids">
            <option value="groceries">Groceries (Walmart/Costco)</option>
            <option value="electronics">Electronics / Hobbies</option>
            <option value="kids">Allowance / Kids Health</option>
        </optgroup>

        <optgroup label="Fees, Legal & Utilities">
            <option value="util">Utilities (Electricity/Water/Cell)</option>
            <option value="legal">Lawyer / Parents Allowance</option>
            <option value="fees">Fees / Taxes / Gov Payments</option>
        </optgroup>
    </select>

    <div id="wBox" class="result winner"></div>
    <div id="rBox" class="result runner"></div>
</div>

<script>
const db = {
    // AUTO
    "car_ins": { w: ["Popular AAdvantage Black", "PRIMARY PROTECTION", "$75k Collision/Theft. Decline agency insurance.", "ins"], r: ["Chase Visa", "Secondary Protection", "$60k coverage.", "ins"] },
    "gas": { w: ["Costco Anywhere Visa", "4% Cash Back", "Up to $7k/yr, then 1%.", "cash"], r: ["OnePay Cash", "3% Cash Back", "If Gas category selected.", "cash"] },
    "parking": { w: ["Costco Anywhere Visa", "3% Cash Back", "Eligible travel category.", "cash"], r: ["OnePay Mastercard", "1.5% Cash Back", "Base rate.", "cash"] },
    "reg": { w: ["OnePay Mastercard", "1.5% Cash Back", "Highest base rate for Gov fees.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },
    "rideshare": { w: ["AMEX Schwab Platinum", "$200 Uber Cash", "$15/mo credit + $20 Dec.", "ins"], r: ["Costco Anywhere Visa", "3% Cash Back", "Travel category.", "cash"] },
    "parts": { w: ["OnePay Mastercard", "1.5% Cash Back", "Best base rate.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },

    // DINING
    "dining": { w: ["Costco Anywhere Visa", "3% Cash Back", "Restaurants, bars, fast food.", "cash"], r: ["OnePay Cash", "3% Cash Back", "If Dining selected.", "cash"] },
    "coffee": { w: ["Costco Anywhere Visa", "3% Cash Back", "Includes cafes.", "cash"], r: ["OnePay Cash", "3% Cash Back", "If Dining selected.", "cash"] },
    "delivery": { w: ["AMEX Schwab Platinum", "Uber Cash", "Apply to Uber Eats orders.", "ins"], r: ["Costco Anywhere Visa", "3% Cash Back", "Coded as restaurant.", "cash"] },

    // HEALTH
    "med": { w: ["Popular AAdvantage Black", "$150k Medical", "Emergency travel coverage.", "ins"], r: ["Popular AAdvantage Black", "$100/Tooth", "Accidental injury abroad.", "ins"] },
    "eyecare": { w: ["OnePay Mastercard", "1.5% Cash Back", "Standard base rate.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },
    "pharmacy": { w: ["Popular AAdvantage Black", "Travel Assist", "Medication delivery abroad.", "ins"], r: ["OnePay Mastercard", "1.5% Cash Back", "Base rewards.", "cash"] },
    "health_ins": { w: ["OnePay Mastercard", "1.5% Cash Back", "Highest base rate.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },

    // HOME
    "home_imp": { w: ["Chase Visa", "Purchase Protection", "Damage/Theft for 120 days.", "ins"], r: ["Popular AAdvantage Black", "Extended Warranty", "+1 year coverage.", "ins"] },
    "home_ins": { w: ["OnePay Mastercard", "1.5% Cash Back", "Standard base rate.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },
    "furnishings": { w: ["Chase Visa", "Purchase Protection", "Up to $500 per item.", "ins"], r: ["Popular AAdvantage Black", "Extended Warranty", "+1 year coverage.", "ins"] },
    "landscape": { w: ["OnePay Mastercard", "1.5% Cash Back", "Standard base rate.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },

    // TRAVEL
    "travel_air": { w: ["Costco Anywhere Visa", "3% Cash Back", "Airfare, hotels, cruises.", "cash"], r: ["Popular AAdvantage Black", "$150k Medical", "Coverage for booked travel.", "ins"] },
    "travel_spec": { w: ["Popular AAdvantage Black", "Travel Specific", "Insurance extends to trip gifts/meds.", "ins"], r: ["Costco Anywhere Visa", "3% Cash Back", "Travel category.", "cash"] },
    "travel_car": { w: ["Popular AAdvantage Black", "Primary CDW", "Use for international rentals.", "ins"], r: ["Chase Visa", "Secondary CDW", "Backup coverage.", "ins"] },

    // OFFICE & PERSONAL
    "office": { w: ["OnePay Mastercard", "1.5% Cash Back", "Best for maintenance/software.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },
    "care": { w: ["OnePay Mastercard", "1.5% Cash Back", "Highest base rate.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },
    "pets": { w: ["OnePay Mastercard", "1.5% Cash Back", "Pet supplies and vet.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },

    // SHOPPING
    "groceries": { w: ["OnePay Mastercard", "5% Cash Back", "At Walmart (w/ Walmart+).", "cash"], r: ["Costco Anywhere Visa", "2% Cash Back", "At Costco Warehouse.", "cash"] },
    "electronics": { w: ["Chase Visa", "Purchase Protection", "New purchases covered 120 days.", "ins"], r: ["Popular AAdvantage Black", "Extended Warranty", "+1 yr warranty.", "ins"] },
    "kids": { w: ["OnePay Mastercard", "1.5% Cash Back", "Allowance and supplies.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },

    // FEES & UTIL
    "util": { w: ["OnePay Mastercard", "1.5% Cash Back", "Water, electricity, cell.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },
    "legal": { w: ["OnePay Mastercard", "1.5% Cash Back", "Lawyer fees / Allowances.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] },
    "fees": { w: ["OnePay Mastercard", "1.5% Cash Back", "Fees, Taxes, Gov payments.", "cash"], r: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate.", "cash"] }
};

function runLogic() {
    const key = document.getElementById('cardSelector').value;
    const w = document.getElementById('wBox');
    const r = document.getElementById('rBox');

    if (!key || !db[key]) {
        w.style.display = 'none'; r.style.display = 'none';
        return;
    }

    const data = db[key];
    w.style.display = 'block'; r.style.display = 'block';

    w.innerHTML = `<span class="tag ${data.w[3]==='cash'?'tag-cash':'tag-ins'}">${data.w[3]==='cash'?'Cash Max':'Protection'}</span><div class="card-name">${data.w[0]}</div><div class="reward">${data.w[1]}</div><div class="desc">${data.w[2]}</div>`;
    r.innerHTML = `<span class="tag ${data.r[3]==='cash'?'tag-cash':'tag-ins'}">${data.r[3]==='cash'?'Cash Max':'Protection'}</span><div class="card-name">${data.r[0]}</div><div class="reward">${data.r[1]}</div><div class="desc">${data.r[2]}</div>`;
}
</script>

</body>
</html>
