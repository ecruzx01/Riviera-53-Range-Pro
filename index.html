<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Maximizer</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --card-bg: #ffffff;
      --text-main: #1e293b;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
      background-size: cover;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .app-container {
      background: var(--card-bg);
      width: 100%;
      max-width: 550px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      padding: 30px;
      box-sizing: border-box;
      margin: 20px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .header {
      text-align: center;
      margin-bottom: 25px;
    }
    .header img {
      width: 64px;
      height: 64px;
      margin-bottom: 10px;
    }
    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      color: #0f172a;
    }
    select {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      background-color: #f8fafc;
      margin-bottom: 20px;
      cursor: pointer;
    }
    select:focus {
      border-color: #3b82f6;
    }
    #sub-question {
      display: none;
      background: #eff6ff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #3b82f6;
    }
    #sub-question p {
      margin: 0 0 10px 0;
      font-weight: 600;
    }
    .sub-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    .sub-btn:hover {
      background: #dbeafe;
    }
    .recommendation-area {
      display: none;
      margin-top: 20px;
    }
    .note {
      font-size: 0.85rem;
      color: #b45309;
      background: #fef3c7;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      display: none;
      line-height: 1.4;
    }
    .cc-card {
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      color: white;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .cc-card span {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-top: 4px;
      font-weight: normal;
    }
    
    /* Card Colors */
    .bg-costco { background: linear-gradient(135deg, #005f83, #0082b3); }
    .bg-schwab { background: linear-gradient(135deg, #a6a8ab, #c0c2c4); color: #1e293b; }
    .bg-bppr { background: linear-gradient(135deg, #e3000f, #ff3333); }
    .bg-aa { background: linear-gradient(135deg, #2b2b2b, #4b4b4b); }
    .bg-onepay { background: linear-gradient(135deg, #6366f1, #3b82f6); }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <img src="https://cdn-icons-png.flaticon.com/512/438/438526.png" alt="App Icon">
    <h1>Card Maximizer</h1>
  </div>

  <select id="category-select">
    <option value="" disabled selected>Select a spending category...</option>
  </select>

  <div id="sub-question">
    <p>What is your top priority for this rental?</p>
    <button class="sub-btn" onclick="resolveSub('insurance')">Coverage (Primary Insurance up to 1.5M / $75k)</button>
    <button class="sub-btn" onclick="resolveSub('discount')">Discounted Rental Rate & Elite Status</button>
    <button class="sub-btn" onclick="resolveSub('cashback')">Maximize Cash Back</button>
  </div>

  <div id="note-area" class="note"></div>

  <div class="recommendation-area" id="recommendation-area">
    <h3 style="margin-top:0; font-size: 1.1rem;">Top 2 Recommended Cards:</h3>
    <div id="cards-container"></div>
  </div>
</div>

  const select = document.getElementById('category-select');
  allCategories.forEach((cat, index) => {
    const opt = document.createElement('option');
    opt.value = index;
    opt.textContent = `${cat.emoji} ${cat.name}`;
    select.appendChild(opt);
  });

  // Handle Selection
  select.addEventListener('change', (e) => {
    const selectedItem = allCategories[e.target.value];
    const ruleData = rulesMap[selectedItem.type];
    
    document.getElementById('note-area').style.display = 'none';
    document.getElementById('recommendation-area').style.display = 'none';
    
    if (ruleData.requiresSubChoice) {
      document.getElementById('sub-question').style.display = 'block';
    } else {
      document.getElementById('sub-question').style.display = 'none';
      if (ruleData.note) {
        document.getElementById('note-area').textContent = ruleData.note;
        document.getElementById('note-area').style.display = 'block';
      }
      renderCards(ruleData.cards);
    }
  });

  function resolveSub(choice) {
    document.getElementById('sub-question').style.display = 'none';
    renderCards(carRentalSubChoices[choice]);
  }

  function renderCards(cards) {
    const container = document.getElementById('cards-container');
    container.innerHTML = '';
    cards.forEach(c => {
      const div = document.createElement('div');
      div.className = `cc-card ${c.color}`;
      div.innerHTML = `${c.name} <span>${c.perk}</span>`;
      container.appendChild(div);
    });
    document.getElementById('recommendation-area').style.display = 'block';
  }

  // Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('Service Worker Registered'))
      .catch(err => console.error('Service Worker Registration Failed:', err));
  }

</html>
