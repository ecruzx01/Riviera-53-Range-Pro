<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edwin's Reward Maximizer</title>
    <style>
        :root { --primary: #0046be; --secondary: #e51937; --bg: #f0f2f5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; }
        .app-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        h1 { color: var(--primary); text-align: center; font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { font-weight: 600; font-size: 14px; color: #444; margin-bottom: 8px; display: block; }
        select { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #dfe3e8; font-size: 16px; appearance: none; background-color: #fff; margin-bottom: 20px; cursor: pointer; }
        .result-card { padding: 18px; border-radius: 12px; margin-bottom: 15px; display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .winner { background: #f0f7ff; border: 1px solid #cce3ff; border-left: 6px solid var(--primary); }
        .runner-up { background: #fffcf0; border: 1px solid #ffecb5; border-left: 6px solid #f39c12; }
        .tag { font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 20px; margin-bottom: 8px; display: inline-block; }
        .tag-cash { background: #2ecc71; color: white; }
        .tag-ins { background: #f39c12; color: white; }
        .card-name { font-size: 18px; font-weight: 700; color: #1a1a1a; }
        .reward-val { color: var(--primary); font-weight: 700; margin: 4px 0; font-size: 16px; }
        .note { font-size: 13px; color: #637381; line-height: 1.4; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>c.Reward Maximizer</h1>
    
    <label for="category">What are you buying?</label>
    <select id="category" onchange="runMaximizer()">
        <option value="">-- Search or Select Category --</option>
        
        <optgroup label="Auto & Transport">
            <option value="gas">Gas & Fuel</option>
            <option value="rental">Car Rental / Insurance</option>
            <option value="parking">Parking</option>
            <option value="registration">Registration (Fees)</option>
            <option value="rideshare">Rideshare</option>
            <option value="parts">Service & Parts</option>
            <option value="tolls">Tolls</option>
        </optgroup>

        <optgroup label="Dining & Drinks">
            <option value="dining">Restaurants & Bars</option>
            <option value="coffee">Coffee Shops</option>
            <option value="fastfood">Fast Food</option>
            <option value="delivery">Food Delivery</option>
        </optgroup>

        <optgroup label="Health & Fitness">
            <option value="medical">Doctor / Dentist / Lab</option>
            <option value="gym">Gym / Equinox</option>
            <option value="pharmacy">Pharmacy / Vitamins</option>
            <option value="health_ins">Health Insurance</option>
        </optgroup>

        <optgroup label="Home">
            <option value="home_imp">Home Improvement / Repairs</option>
            <option value="furnishings">Furnishings</option>
            <option value="landscape">Landscape</option>
            <option value="home_services">Home Services</option>
        </optgroup>

        <optgroup label="Personal & Family">
            <option value="groceries">Groceries (Walmart/Costco)</option>
            <option value="streaming">Entertainment / Software</option>
            <option value="gifts">Gifts</option>
        </optgroup>

        <optgroup label="Fees & Financial">
            <option value="gov">Government Payments</option>
            <option value="finance">Finance Charges / Late Fees</option>
        </optgroup>
    </select>

    <div id="winBox" class="result-card winner"></div>
    <div id="runBox" class="result-card runner-up"></div>
</div>

<script>
const data = {
    // Auto & Transport
    [span_0](start_span)"gas": { win: ["Costco Anywhere Visa", "4% Cash Back", "Up to $7k/yr, then 1%[span_0](end_span)[span_1](start_span)", "cash"], run: ["OnePay Cash", "3% Cash Back", "If Gas category selected + Cash+ status[span_1](end_span)", "cash"] },
    "rental": { win: ["Popular AAdvantage Black", "PRIMARY PROTECTION", "$75k Collision/Theft. [span_2](start_span)Decline agency CDW[span_2](end_span)[span_3](start_span)", "ins"], run: ["Chase Visa Signature", "Secondary Insurance", "$60k coverage[span_3](end_span)", "ins"] },
    [span_4](start_span)"parking": { win: ["Costco Anywhere Visa", "3% Cash Back", "Classified as Travel purchase[span_4](end_span)[span_5](start_span)", "cash"], run: ["OnePay Mastercard", "1.5% Cash Back", "Base rewards rate[span_5](end_span)", "cash"] },
    [span_6](start_span)"registration": { win: ["OnePay Mastercard", "1.5% Cash Back", "Best for misc. government fees[span_6](end_span)[span_7](start_span)", "cash"], run: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate[span_7](end_span)", "cash"] },
    [span_8](start_span)"rideshare": { win: ["AMEX Schwab Platinum", "$200 Uber Cash", "Distributed monthly", "ins"], run: ["Costco Anywhere Visa", "3% Cash Back", "Classified as Travel[span_8](end_span)", "cash"] },
    [span_9](start_span)"parts": { win: ["OnePay Mastercard", "1.5% Cash Back", "Highest base rate for service[span_9](end_span)[span_10](start_span)", "cash"], run: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate[span_10](end_span)", "cash"] },
    [span_11](start_span)"tolls": { win: ["Costco Anywhere Visa", "3% Cash Back", "Eligible travel purchase worldwide[span_11](end_span)[span_12](start_span)", "cash"], run: ["OnePay Mastercard", "1.5% Cash Back", "Base rate[span_12](end_span)", "cash"] },

    // Dining & Drinks
    [span_13](start_span)"dining": { win: ["Costco Anywhere Visa", "3% Cash Back", "Includes cafes, bars, lounges[span_13](end_span)[span_14](start_span)", "cash"], run: ["OnePay Cash", "3% Cash Back", "If Dining selected + Cash+ status[span_14](end_span)", "cash"] },
    [span_15](start_span)"coffee": { win: ["Costco Anywhere Visa", "3% Cash Back", "Eligible at cafes and bakeries[span_15](end_span)[span_16](start_span)", "cash"], run: ["OnePay Cash", "3% Cash Back", "With Cash+ status[span_16](end_span)", "cash"] },
    [span_17](start_span)"fastfood": { win: ["Costco Anywhere Visa", "3% Cash Back", "Includes fast food restaurants[span_17](end_span)[span_18](start_span)", "cash"], run: ["OnePay Mastercard", "1.5% Cash Back", "Standard rate[span_18](end_span)", "cash"] },
    [span_19](start_span)"delivery": { win: ["AMEX Schwab Platinum", "Uber Cash", "Use monthly credit for Uber Eats", "ins"], run: ["Costco Anywhere Visa", "3% Cash Back", "If coded as restaurant[span_19](end_span)", "cash"] },

    // Health & Fitness
    [span_20](start_span)[span_21](start_span)"medical": { win: ["Popular AAdvantage Black", "$150,000 Medical", "While traveling outside home country[span_20](end_span)[span_21](end_span)[span_22](start_span)", "ins"], run: ["Popular AAdvantage Black", "$100 Dental", "Per tooth for accidental injury[span_22](end_span)", "ins"] },
    [span_23](start_span)"gym": { win: ["AMEX Schwab Platinum", "$300 Annual Credit", "For Equinox memberships or Equinox+ app", "ins"], run: ["OnePay Mastercard", "1.5% Cash Back", "Base rate[span_23](end_span)", "cash"] },
    [span_24](start_span)"health_ins": { win: ["OnePay Mastercard", "1.5% Cash Back", "Best for recurring premiums[span_24](end_span)[span_25](start_span)", "cash"], run: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate[span_25](end_span)", "cash"] },
    [span_26](start_span)"pharmacy": { win: ["Popular AAdvantage Black", "Medical Assistance", "Includes prescription document delivery[span_26](end_span)[span_27](start_span)", "ins"], run: ["OnePay Mastercard", "1.5% Cash Back", "Standard rate[span_27](end_span)", "cash"] },

    // Home
    [span_28](start_span)"home_imp": { win: ["Chase Visa Signature", "Purchase Protection", "Covered for theft/damage for 120 days[span_28](end_span)[span_29](start_span)", "ins"], run: ["Popular AAdvantage Black", "+1 Year Warranty", "Extends manufacturer warranty[span_29](end_span)", "ins"] },
    [span_30](start_span)"furnishings": { win: ["Chase Visa Signature", "Purchase Protection", "Covers up to $500 per item[span_30](end_span)[span_31](start_span)", "ins"], run: ["Popular AAdvantage Black", "Warranty Extension", "Up to $10,000 per incident[span_31](end_span)", "ins"] },
    [span_32](start_span)"landscape": { win: ["OnePay Mastercard", "1.5% Cash Back", "Standard base rate[span_32](end_span)[span_33](start_span)", "cash"], run: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate[span_33](end_span)", "cash"] },
    [span_34](start_span)"home_services": { win: ["OnePay Mastercard", "1.5% Cash Back", "Best for service payments[span_34](end_span)[span_35](start_span)", "cash"], run: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate[span_35](end_span)", "cash"] },

    // Personal & Family
    [span_36](start_span)"groceries": { win: ["OnePay Mastercard", "5% Cash Back", "At Walmart with Walmart+ member status[span_36](end_span)[span_37](start_span)", "cash"], run: ["Costco Anywhere Visa", "2% Cash Back", "At Costco and Costco.com[span_37](end_span)", "cash"] },
    [span_38](start_span)"streaming": { win: ["AMEX Schwab Platinum", "$240 Annual Credit", "$20/mo for Disney, Hulu, ESPN+", "ins"], run: ["OnePay Mastercard", "1.5% Cash Back", "Highest standard rate[span_38](end_span)", "cash"] },
    [span_39](start_span)"gifts": { win: ["Chase Visa Signature", "Purchase Protection", "Gifts are covered for theft/damage[span_39](end_span)[span_40](start_span)", "ins"], run: ["OnePay Mastercard", "1.5% Cash Back", "Standard rate[span_40](end_span)", "cash"] },

    // Fees & Financial
    [span_41](start_span)"gov": { win: ["OnePay Mastercard", "1.5% Cash Back", "Best for utilities/taxes[span_41](end_span)[span_42](start_span)", "cash"], run: ["Costco Anywhere Visa", "1% Cash Back", "Standard rate[span_42](end_span)", "cash"] },
    [span_43](start_span)"finance": { win: ["AMEX Schwab Platinum", "$40 Max Fee", "Standard late/returned payment fees", "ins"], run: ["Costco Anywhere Visa", "$0.50 Min Interest", "Minimum interest charge[span_43](end_span)", "cash"] }
};

function runMaximizer() {
    const val = document.getElementById('category').value;
    const wBox = document.getElementById('winBox');
    const rBox = document.getElementById('runBox');

    if (!val || !data[val]) {
        wBox.style.display = 'none';
        rBox.style.display = 'none';
        return;
    }

    const item = data[val];
    updateBox(wBox, item.win);
    updateBox(rBox, item.run);
}

function updateBox(el, info) {
    el.style.display = 'block';
    el.innerHTML = `
        <span class="tag ${info[3] === 'cash' ? 'tag-cash' : 'tag-ins'}">${info[3] === 'cash' ? 'Cash Maximizer' : 'Safety Priority'}</span>
        <div class="card-name">${info[0]}</div>
        <div class="reward-val">${info[1]}</div>
        <div class="note">${info[2]}</div>
    `;
}
</script>

</body>
</html>
