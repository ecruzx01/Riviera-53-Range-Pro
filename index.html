<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c.Reward Maximizer</title>
    <style>
        :root { --primary: #0046be; --secondary: #e51937; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; margin-bottom: 20px; font-size: 16px; }
        .result-box { padding: 20px; border-radius: 10px; display: none; margin-top: 10px; }
        .winner { background: #e7f3ff; border-left: 5px solid var(--primary); margin-bottom: 15px; }
        .runner-up { background: #fff5f6; border-left: 5px solid var(--secondary); }
        .tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .tag-cash { background: #2ecc71; color: white; }
        .tag-ins { background: #f39c12; color: white; }
        .note { font-size: 14px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h1>c.Reward Maximizer</h1>
    
    <label for="category">Select Spending Category:</label>
    <select id="category" onchange="maximize()">
        <option value="">-- Choose Category --</option>
        <optgroup label="Auto & Transport">
            <option value="gas">Gas & Fuel</option>
            <option value="rental">Car Rental / Insurance</option>
            <option value="rideshare">Rideshare (Uber/Lyft)</option>
        </optgroup>
        <optgroup label="Dining & Groceries">
            <option value="dining">Restaurants & Bars</option>
            <option value="walmart">Walmart Purchases</option>
            <option value="costco">Costco Warehouse</option>
        </optgroup>
        <optgroup label="Health & Fitness">
            <option value="medical">Doctor / Medical (Travel)</option>
            <option value="gym">Gym / Equinox</option>
        </optgroup>
        <optgroup label="Personal & Home">
            <option value="streaming">Streaming & Entertainment</option>
            <option value="warranty">Electronics / Large Appliances</option>
        </optgroup>
    </select>

    <div id="winner" class="result-box winner"></div>
    <div id="runnerup" class="result-box runner-up"></div>
</div>

<script>
function maximize() {
    const cat = document.getElementById('category').value;
    const win = document.getElementById('winner');
    const run = document.getElementById('runnerup');

    if(!cat) { win.style.display = 'none'; run.style.display = 'none'; return; }

    let winner = {}, runner = {};

    switch(cat) {
        case 'gas':
            [span_7](start_span)winner = { name: "Costco Anywhere Visa", reward: "4% Cash Back", note: "On first $7,000 per year[span_7](end_span)", type: "cash" };
            [span_8](start_span)runner = { name: "OnePay Cash", reward: "3% Cash Back", note: "If Gas category is selected + OnePay Cash+ status[span_8](end_span)", type: "cash" };
            break;
        case 'rental':
            winner = { name: "Popular AAdvantage Black", reward: "PRIMARY Insurance", note: "$75,000 Collision/Theft coverage. [span_9](start_span)Decline rental agency insurance[span_9](end_span)", type: "ins" };
            [span_10](start_span)runner = { name: "Chase Visa Signature", reward: "Secondary Insurance", note: "$60,000 coverage[span_10](end_span)", type: "ins" };
            break;
        case 'rideshare':
            winner = { name: "AMEX Schwab Platinum", reward: "$200 Uber Cash", note: "Distributed monthly + $120 Uber One credit", type: "ins" };
            [span_11](start_span)runner = { name: "Costco Anywhere Visa", reward: "3% Cash Back", note: "Classified under Travel category[span_11](end_span)", type: "cash" };
            break;
        case 'dining':
            [span_12](start_span)winner = { name: "Costco Anywhere Visa", reward: "3% Cash Back", note: "Includes restaurants, bars, and fast food[span_12](end_span)", type: "cash" };
            [span_13](start_span)runner = { name: "OnePay Cash", reward: "3% Cash Back", note: "If Dining category is selected + OnePay Cash+ status[span_13](end_span)", type: "cash" };
            break;
        case 'walmart':
            [span_14](start_span)winner = { name: "OnePay Mastercard", reward: "5% Cash Back", note: "If Walmart+ member and accounts are linked[span_14](end_span)", type: "cash" };
            [span_15](start_span)runner = { name: "OnePay Mastercard", reward: "3% Cash Back", note: "Standard Walmart back[span_15](end_span)", type: "cash" };
            break;
        case 'costco':
            [span_16](start_span)winner = { name: "Costco Anywhere Visa", reward: "2% Cash Back", note: "Valid at Costco and Costco.com[span_16](end_span)", type: "cash" };
            [span_17](start_span)runner = { name: "OnePay Mastercard", reward: "1.5% Cash Back", note: "Standard base rate[span_17](end_span)", type: "cash" };
            break;
        case 'medical':
            [span_18](start_span)[span_19](start_span)winner = { name: "Popular AAdvantage Black", reward: "$150,000 Coverage", note: "Emergency medical/dental expenses while traveling outside Home Country[span_18](end_span)[span_19](end_span)", type: "ins" };
            [span_20](start_span)runner = { name: "Popular AAdvantage Black", reward: "$100,000 Evacuation", note: "Covers emergency medical evacuation/repatriation[span_20](end_span)", type: "ins" };
            break;
        case 'gym':
            winner = { name: "AMEX Schwab Platinum", reward: "$300 Equinox Credit", note: "Annual statement credit for Equinox+ or club membership", type: "ins" };
            runner = { name: "OnePay Mastercard", reward: "1.5% Cash Back", note: "Base spend rate", type: "cash" };
            break;
        case 'streaming':
            winner = { name: "AMEX Schwab Platinum", reward: "$240 Digital Credit", note: "Up to $20/month for Disney+, Hulu, ESPN+, NY Times", type: "ins" };
            runner = { name: "OnePay Mastercard", reward: "1.5% Cash Back", note: "Base spend rate", type: "cash" };
            break;
        case 'warranty':
            [span_21](start_span)winner = { name: "Chase Visa Signature", reward: "+1 Year Warranty", note: "Extends manufacturer's warranty by 1 year[span_21](end_span)", type: "ins" };
            [span_22](start_span)runner = { name: "Popular AAdvantage Black", reward: "+1 Year Warranty", note: "Up to $10,000 per occurrence[span_22](end_span)", type: "ins" };
            break;
    }

    render(win, winner);
    render(run, runner);
}

function render(el, data) {
    el.style.display = 'block';
    el.innerHTML = `
        <span class="tag ${data.type === 'cash' ? 'tag-cash' : 'tag-ins'}">${data.type === 'cash' ? 'Highest Reward' : 'Best Protection'}</span>
        <div style="font-weight: bold; font-size: 18px;">${data.name}</div>
        <div style="color: #007bff; font-weight: bold; margin: 5px 0;">${data.reward}</div>
        <div class="note">${data.note}</div>
    `;
}
</script>

</body>
</html>
